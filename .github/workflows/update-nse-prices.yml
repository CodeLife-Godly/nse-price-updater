name: NSE Price Update (Python)

on:
  # NSE market hours: 9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC.
  # Window widened slightly with margin, every 15 min, Mon-Fri.
  schedule:
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE price update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python update_nse_prices.py
