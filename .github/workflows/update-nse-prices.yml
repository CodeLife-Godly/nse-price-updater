name: NSE Price Update

on:
  # NSE market hours: 9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC.
  # Window widened slightly with margin, every 15 min, Mon-Fri.
  schedule:
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run NSE price update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run update
